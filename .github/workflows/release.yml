name: Release

on:
  release:
    types: [published]

jobs:
  build-android:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          sdkmanager --licenses <<< "y" || true

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Generate debug keystore
        run: |
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat >> ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Export Android debug APK
        run: |
          mkdir -p export/android
          godot --headless --path . \
            --export-debug "Android Debug" \
            export/android/protocol-silent-night-debug.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: export/android/protocol-silent-night-debug.apk

  build-html5:
    name: Build HTML5 Export
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Export HTML5
        run: |
          mkdir -p export/html5
          godot --headless --path . \
            --export-release "HTML5" \
            export/html5/index.html
          cd export && zip -r ../protocol-silent-night-web.zip html5/

      - name: Upload web export to release
        uses: softprops/action-gh-release@v2
        with:
          files: protocol-silent-night-web.zip
