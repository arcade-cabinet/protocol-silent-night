name: CI

on:
  pull_request:

jobs:
  test:
    name: Godot Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: false

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Run unit + component + e2e tests
        run: |
          godot --headless --path . \
            -s addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add "res://test/unit/" \
            --add "res://test/component/" \
            --add "res://test/e2e/" \
            --ignoreHeadlessMode
        timeout-minutes: 10

      - name: LOC compliance check
        run: |
          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            count=$(wc -l < "$f")
            if [ "$count" -gt 200 ]; then
              echo "VIOLATION: $f ($count lines)"
              fail=1
            fi
          done < <(find scripts scenes -name "*.gd" 2>/dev/null)
          [ "$fail" -eq 0 ] && echo "LOC check passed" || exit 1

      - name: Validate declaration JSON
        run: |
          find declarations -name "*.json" | while read -r f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All declaration JSON valid"

  mobile-visual-guard:
    name: Mobile Visual Guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Install display + software rendering dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libgl1-mesa-dri libglu1-mesa mesa-utils

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: false

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Run mobile touch-flow display e2e
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe
        run: |
          xvfb-run -a \
            godot --display-driver x11 --rendering-driver opengl3 \
            --path . -s res://test/e2e/test_mobile_touch_flow.gd
        timeout-minutes: 10

      - name: Run left-handed sightline mobile touch e2e
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe
        run: |
          xvfb-run -a \
            godot --display-driver x11 --rendering-driver opengl3 \
            --path . -s res://test/e2e/test_mobile_touch_sightline_left.gd
        timeout-minutes: 10

      - name: Run unlock-backed sweep mobile touch e2e
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe
        run: |
          xvfb-run -a \
            godot --display-driver x11 --rendering-driver opengl3 \
            --path . -s res://test/e2e/test_mobile_touch_sweep_unlock.gd
        timeout-minutes: 10

      - name: Run default skate mobile touch e2e
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe
        run: |
          xvfb-run -a \
            godot --display-driver x11 --rendering-driver opengl3 \
            --path . -s res://test/e2e/test_mobile_touch_skate_default.gd
        timeout-minutes: 10

      - name: Run mobile visual guard
        env:
          LIBGL_ALWAYS_SOFTWARE: "1"
          MESA_LOADER_DRIVER_OVERRIDE: llvmpipe
          GODOT_CAPTURE_BIN: xvfb-run
          GODOT_CAPTURE_ARGS: -a godot --display-driver x11 --rendering-driver opengl3
          GODOT_ASSERT_BIN: godot
          GODOT_ASSERT_ARGS: --headless
        run: ./scripts/run_mobile_visual_guard.sh
        timeout-minutes: 10

      - name: Upload mobile screenshots
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: mobile-visual-guard-${{ github.event.pull_request.number || github.sha }}
          path: .artifacts/screenshots
          retention-days: 14

  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          sdkmanager --licenses <<< "y" || true

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat >> ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Export Android debug APK
        run: |
          mkdir -p export/android
          godot --headless --path . \
            --export-debug "Android Debug" \
            export/android/protocol-silent-night-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}
          path: export/android/protocol-silent-night-debug.apk
          retention-days: 14

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: false

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 180

      - name: Smoke test
        run: timeout 10 godot --headless --path . --quit-after 5 && echo "SMOKE OK"
