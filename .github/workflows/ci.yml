name: CI

on:
  pull_request:

jobs:
  test:
    name: Godot Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: false

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Run unit + component + e2e tests
        run: |
          godot --headless --path . \
            -s addons/gdUnit4/bin/GdUnitCmdTool.gd \
            --add "res://test/unit/" \
            --add "res://test/component/" \
            --add "res://test/e2e/" \
            --ignoreHeadlessMode
        timeout-minutes: 10

      - name: LOC compliance check
        run: |
          fail=0
          while IFS= read -r f; do
            [ -f "$f" ] || continue
            count=$(wc -l < "$f")
            if [ "$count" -gt 200 ]; then
              echo "VIOLATION: $f ($count lines)"
              fail=1
            fi
          done < <(find scripts scenes -name "*.gd" 2>/dev/null)
          [ "$fail" -eq 0 ] && echo "LOC check passed" || exit 1

      - name: Validate declaration JSON
        run: |
          find declarations -name "*.json" | while read -r f; do
            python3 -c "import json; json.load(open('$f'))" \
              || { echo "INVALID JSON: $f"; exit 1; }
          done
          echo "All declaration JSON valid"

  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true

      - name: Setup Java 17
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          sdkmanager --licenses <<< "y" || true

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android -alias androiddebugkey -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat >> ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Export Android debug APK
        run: |
          mkdir -p export/android
          godot --headless --path . \
            --export-debug "Android Debug" \
            export/android/protocol-silent-night-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-debug-apk-${{ github.event.pull_request.number }}
          path: export/android/protocol-silent-night-debug.apk
          retention-days: 14

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@f166999204a4f2722c6fe042fbaa3b3ea0d9c789 # v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: false

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Smoke test
        run: timeout 10 godot --headless --path . --quit-after 5 && echo "SMOKE OK"
