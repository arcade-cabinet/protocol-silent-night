name: CD

on:
  push:
    branches: [main]

concurrency:
  group: cd-main
  cancel-in-progress: true

jobs:
  export-html5:
    name: Export HTML5 to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Export HTML5
        run: |
          mkdir -p export/html5
          godot --headless --path . --export-release "HTML5" export/html5/index.html
          touch export/html5/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: export/html5

      - id: deploy
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

  build-android-debug:
    name: Build Android Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true  # GLB and audio assets tracked via Git LFS

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android build tools
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-34" "platform-tools"
          sdkmanager --licenses <<< "y" || true

      - name: Setup Godot (with export templates)
        uses: chickensoft-games/setup-godot@v2
        with:
          version: ${{ vars.GODOT_VERSION || '4.6.2' }}
          use-dotnet: false
          include-templates: true

      - name: Import project resources
        run: godot --headless --path . --import --quit-after 60 || true

      - name: Generate debug keystore
        run: |
          mkdir -p android
          keytool -genkeypair \
            -keystore android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot Android SDK path
        run: |
          mkdir -p ~/.config/godot
          cat >> ~/.config/godot/editor_settings-4.tres << 'EOF'
          [gd_resource type="EditorSettings"]
          [resource]
          export/android/android_sdk_path = "$ANDROID_SDK_ROOT"
          EOF

      - name: Export Android debug APK
        run: |
          mkdir -p export/android
          godot --headless --path . \
            --export-debug "Android Debug" \
            export/android/protocol-silent-night-debug.apk

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: protocol-silent-night-debug-${{ github.sha }}
          path: export/android/protocol-silent-night-debug.apk
          retention-days: 30
